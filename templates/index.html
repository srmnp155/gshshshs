<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quadratic Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { max-width: 400px; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; }
        input[type="number"] { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 15px; padding: 10px 15px; }
        .result, .error { margin-top: 20px; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Interactive Quadratic Calculator</h1>
    <form method="post">
        <label for="a">Coefficient a:</label>
        <input type="number" step="any" name="a" id="a" required>

        <label for="b">Coefficient b:</label>
        <input type="number" step="any" name="b" id="b" required>

        <label for="c">Coefficient c:</label>
        <input type="number" step="any" name="c" id="c" required>

        <button type="submit">Calculate</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if result %}
        <div class="result">
            {% if result is string %}
                {{ result }}
            {% else %}
                Roots: {{ result[0] }} and {{ result[1] }}
            {% endif %}
        </div>
    {% endif %}
</body>
</html>
